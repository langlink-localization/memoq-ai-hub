name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.6.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/package.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install workspace dependencies
        run: pnpm install

      - name: Resolve release version
        id: release_meta
        shell: pwsh
        run: |
          $version = node ./tooling/scripts/release-metadata.mjs version
          node ./tooling/scripts/release-metadata.mjs check-tag "${{ github.ref_name }}" | Out-Null
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows release bundle
        shell: pwsh
        run: ./tooling/scripts/package-windows.ps1 -Configuration Release

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.release_meta.outputs.tag }}"
          $zipPath = "apps/desktop/out/memoq-ai-hub-win32-x64.zip"
          $manifestPath = "apps/desktop/out/memoq-ai-hub-updates-stable.json"
          $notesPath = "docs/release-notes/$tag.md"

          if (-not (Test-Path $zipPath)) {
            throw "Release zip not found at $zipPath"
          }

          if (-not (Test-Path $manifestPath)) {
            throw "Update manifest not found at $manifestPath"
          }

          if (-not (Test-Path $notesPath)) {
            throw "Release notes file not found at $notesPath"
          }

          $releaseTitle = "memoQ AI Hub $tag"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zipPath $manifestPath --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload release assets for $tag"
            }

            gh release edit $tag --title $releaseTitle --notes-file $notesPath
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update release notes for $tag"
            }
          } else {
            gh release create $tag $zipPath $manifestPath --title $releaseTitle --notes-file $notesPath
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create release $tag"
            }
          }
